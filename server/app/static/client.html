<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telex</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#0a0a0a">
<script>(function(){const t=localStorage.getItem('telex_theme');if(t)document.documentElement.dataset.theme=t;})();</script>
<style>
:root {
  --bg: #0a0a0a; --surface: #141414; --border: #252525;
  --amber: #e8b84b; --amber-dim: #c8973a;
  --green: #4caf50; --red: #f44336;
  --font: 'Courier New', monospace;
}
[data-theme="green"] {
  --bg: #020a06; --surface: #0b1e12; --border: #1c3d28;
  --amber: #00ff9d; --amber-dim: #00c87a;
  --green: #00ff9d; --red: #ff5555;
}
[data-theme="green"] body { text-shadow: 0 0 6px rgba(0,255,157,.12); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--amber);
  font-family: var(--font); min-height: 100vh;
  display: flex; flex-direction: column;
}
.main-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 1.5rem;
}

/* font-size:14px sets the ch reference so 42ch = 42 Courier New chars at printer size */
.card { width: 100%; font-size: 14px; max-width: calc(42ch + 1.7rem); }

/* Header */
.telex-header { text-align: center; margin-bottom: 2rem; }
.telex-header .logo { font-size: 2rem; }
/* inline-block + negative margin-right removes the trailing letter-spacing
   from the layout box so text-align:center works visually correctly */
.telex-header .logo span { letter-spacing: .5em; display: inline-block; margin-right: -.5em; }
.telex-header .to {
  font-size: 1rem; color: var(--amber-dim);
  margin-top: .4rem; letter-spacing: .05em;
}
.telex-header .name {
  font-size: 1.4rem; margin-top: .15rem;
}

/* States */
#state-loading, #state-error, #state-form, #state-success { display: none; }
#state-loading.active, #state-error.active, #state-form.active, #state-success.active {
  display: block;
}

/* Form */
label {
  display: block; font-size: .75rem; color: var(--amber-dim);
  letter-spacing: .12em; margin-bottom: .3rem; margin-top: 1.1rem;
}
label:first-of-type { margin-top: 0; }

input, textarea {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  color: var(--amber); font-family: var(--font);
  padding: .65rem .85rem; font-size: 1rem; outline: none;
}
input:focus, textarea:focus { border-color: var(--amber-dim); }
input[type="password"] { letter-spacing: .15em; font-size: 1.1rem; }
textarea { font-size: 14px; line-height: 1.5; min-height: 130px; resize: vertical; }
textarea::placeholder { color: var(--amber-dim); }
.char-count { display: block; text-align: right; font-size: .78rem; color: var(--amber-dim); margin-top: .3rem; }
.char-count.over { color: var(--red); }

.send-btn {
  width: 100%; margin-top: 1.25rem;
  background: none; border: 1px solid var(--amber-dim);
  color: var(--amber); font-family: var(--font);
  font-size: 1rem; padding: .7rem; cursor: pointer;
  letter-spacing: .1em;
}
.send-btn:hover { border-color: var(--amber); background: rgba(232,184,75,.07); }
.send-btn:disabled { opacity: .4; cursor: not-allowed; }

/* Feedback */
.feedback {
  margin-top: .75rem; padding: .55rem .75rem;
  font-size: .85rem; display: none; border-left: 2px solid;
}
.feedback.err { color: var(--red); border-color: var(--red); display: block; }
.feedback.warn { color: var(--amber); border-color: var(--amber-dim); display: block; }

/* Success state */
.success-box { text-align: center; padding: 1.5rem 0; }
.success-icon { font-size: 2.5rem; margin-bottom: .75rem; }
.success-text { font-size: 1.1rem; margin-bottom: .3rem; }
.success-sub { font-size: .85rem; color: var(--amber-dim); }
.new-btn {
  margin-top: 1.5rem; background: none; border: 1px solid var(--border);
  color: var(--amber-dim); font-family: var(--font);
  font-size: .85rem; padding: .5rem 1.2rem; cursor: pointer;
}
.new-btn:hover { color: var(--amber); border-color: var(--amber-dim); }

/* Error state */
.error-box { text-align: center; padding: 1.5rem 0; color: var(--amber-dim); }

/* Loading */
.loading-box { text-align: center; color: var(--amber-dim); padding: 2rem 0; font-size: .9rem; }

/* Theme toggle */
.theme-btn { position: fixed; top: .8rem; right: .8rem; background: none; border: 1px solid var(--border); color: var(--amber-dim); cursor: pointer; font-family: var(--font); font-size: .75rem; padding: .25rem .55rem; }
.theme-btn:hover { color: var(--amber); border-color: var(--amber-dim); }

/* Footer */
.gh-footer { text-align: center; padding: .6rem; font-size: .72rem; color: var(--amber-dim); opacity: .5; border-top: 1px solid var(--border); }
.gh-footer a { color: inherit; text-decoration: none; }
.gh-footer a:hover { opacity: 1; color: var(--amber); }

/* Image section */
.img-toggle-btn {
  display: block; width: 100%; margin-top: .75rem;
  background: none; border: 1px dashed var(--border);
  color: var(--amber-dim); font-family: var(--font);
  font-size: .82rem; padding: .45rem; cursor: pointer; text-align: center;
}
.img-toggle-btn:hover { color: var(--amber); border-color: var(--amber-dim); }
.img-section { margin-top: .75rem; }
.draw-tools {
  display: flex; gap: .3rem; align-items: center;
  flex-wrap: wrap; margin-bottom: .4rem;
}
.tool-btn {
  background: none; border: 1px solid var(--border);
  color: var(--amber-dim); font-family: var(--font);
  font-size: .78rem; padding: .22rem .5rem; cursor: pointer;
}
.tool-btn:hover, .tool-btn.active { color: var(--amber); border-color: var(--amber-dim); background: rgba(232,184,75,.06); }
.tool-btn:disabled { opacity: .3; cursor: not-allowed; background: none; }
.tool-select {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--amber-dim); font-family: var(--font);
  font-size: .78rem; padding: .2rem .35rem;
}
.color-swatches { display: flex; gap: .25rem; align-items: center; }
.swatch { width: 17px; height: 17px; border: 1px solid var(--border); cursor: pointer; padding: 0; flex-shrink: 0; }
.swatch.active { box-shadow: 0 0 0 2px var(--amber); }
.canvas-wrap {
  position: relative; width: 100%;
  padding-bottom: calc(256 / 384 * 100%);
  border: 1px solid var(--border);
}
.canvas-wrap canvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: white; cursor: crosshair; touch-action: none; display: block;
}
.img-hint { font-size: .7rem; color: var(--amber-dim); opacity: .6; margin-top: .3rem; text-align: right; }
</style>
</head>
<body>
<button class="theme-btn" onclick="toggleTheme()" title="Changer de thème">◑</button>
<div class="main-wrap">
<div class="card">

  <div class="telex-header">
    <div class="logo"><span>TELEX</span></div>
    <img src="/favicon.svg" width="64" height="64" alt="" style="display:block;margin:.75rem auto 1rem;">
    <div class="to">Message pour</div>
    <div class="name" id="client-name">…</div>
  </div>

  <!-- Loading -->
  <div id="state-loading" class="active">
    <div class="loading-box">Chargement…</div>
  </div>

  <!-- 404 / error -->
  <div id="state-error">
    <div class="error-box">
      <div style="font-size:1.5rem;margin-bottom:.5rem;">✗</div>
      <div id="error-msg">Destinataire introuvable.</div>
    </div>
  </div>

  <!-- Send form -->
  <div id="state-form">
    <label>PRÉNOM <span style="color:var(--amber-dim);font-size:.7rem;font-weight:normal;">(optionnel)</span></label>
    <input type="text" id="sender" maxlength="50" autocomplete="given-name" placeholder="Votre prénom…">

    <label>MOT DE PASSE</label>
    <input type="password" id="password" autocomplete="off" inputmode="numeric"
           placeholder="••••••••">

    <label>VOTRE MESSAGE <span style="color:var(--amber-dim);font-size:.7rem;font-weight:normal;">(500 car. max)</span></label>
    <textarea id="content" maxlength="500" placeholder="Écrivez votre message…"></textarea>
    <span id="char-count" class="char-count">0 / 500</span>

    <button type="button" class="img-toggle-btn" id="img-toggle-btn" onclick="toggleImageSection()">[ + Ajouter un dessin ou une photo ]</button>
    <div class="img-section" id="img-section" style="display:none">
      <div class="draw-tools">
        <button type="button" class="tool-btn active" id="tool-pen" onclick="setTool('pen')">✏ Stylo</button>
        <button type="button" class="tool-btn" id="tool-eraser" onclick="setTool('eraser')">⌫ Gomme</button>
        <button type="button" class="tool-btn" id="tool-fill" onclick="setTool('fill')">⬛ Remplir</button>
        <select id="pen-size" class="tool-select" title="Épaisseur">
          <option value="2">Fin</option>
          <option value="5" selected>Moyen</option>
          <option value="12">Épais</option>
        </select>
        <div class="color-swatches">
          <button class="swatch active" data-gray="0" style="background:#000" onclick="setColor(0)" title="Noir"></button>
          <button class="swatch" data-gray="64" style="background:#404040" onclick="setColor(64)" title="Gris foncé"></button>
          <button class="swatch" data-gray="128" style="background:#808080" onclick="setColor(128)" title="Gris moyen"></button>
          <button class="swatch" data-gray="192" style="background:#c0c0c0" onclick="setColor(192)" title="Gris clair"></button>
          <button class="swatch" data-gray="255" style="background:#fff" onclick="setColor(255)" title="Blanc"></button>
        </div>
        <span style="flex:1"></span>
        <button type="button" class="tool-btn" id="undo-btn" onclick="undo()" title="Annuler" disabled>↩ Annuler</button>
        <button type="button" class="tool-btn" onclick="document.getElementById('img-file').click()">⬆ Photo</button>
        <button type="button" class="tool-btn" onclick="clearCanvas()">⊘ Effacer</button>
      </div>
      <input type="file" id="img-file" accept="image/*" style="display:none" onchange="handleUpload(this)">
      <div class="canvas-wrap">
        <canvas id="draw-canvas" width="384" height="256"></canvas>
      </div>
      <div class="img-hint">Aperçu impression · noir &amp; blanc · 384 pts</div>
    </div>

    <div id="form-feedback" class="feedback"></div>

    <button class="send-btn" id="send-btn" onclick="sendMessage()">ENVOYER →</button>
  </div>

  <!-- Success -->
  <div id="state-success">
    <div class="success-box">
      <div class="success-icon">✓</div>
      <div class="success-text">Message envoyé !</div>
      <div class="success-sub" id="success-sub"></div>
      <button class="new-btn" onclick="newMessage()">Envoyer un autre message</button>
    </div>
  </div>


</div>
</div>
<div class="gh-footer"><a href="https://github.com/gbwebdev/telex" target="_blank" rel="noopener">gbwebdev/telex</a></div>

<script>
const identifier = location.pathname.replace(/^\/+|\/+$/g, '');
let clientName = '';
// Keep password in memory for the session (cleared when tab closes)
let savedPassword = sessionStorage.getItem('telex_pwd_' + identifier) || '';

function show(stateId) {
  ['loading', 'error', 'form', 'success'].forEach(s => {
    document.getElementById('state-' + s).classList.remove('active');
  });
  document.getElementById('state-' + stateId).classList.add('active');
}

async function init() {
  if (!identifier) {
    document.getElementById('error-msg').textContent = 'Adresse incorrecte.';
    show('error');
    return;
  }

  try {
    const r = await fetch(`/api/public/${identifier}`);
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      document.getElementById('error-msg').textContent = d.detail || 'Destinataire introuvable.';
      show('error');
      return;
    }
    const data = await r.json();
    clientName = data.name;
    document.getElementById('client-name').textContent = clientName;
    document.title = `Telex — ${clientName}`;

    if (savedPassword) {
      document.getElementById('password').value = savedPassword;
    }
    show('form');
  } catch {
    document.getElementById('error-msg').textContent = 'Erreur de connexion au serveur.';
    show('error');
  }
}

document.getElementById('content').addEventListener('input', function() {
  const clean = this.value.replace(/\p{Extended_Pictographic}/gu, '');
  if (clean !== this.value) {
    const pos = this.selectionStart - (this.value.length - clean.length);
    this.value = clean;
    this.setSelectionRange(pos, pos);
    setFeedback('Les emojis ne s\'impriment pas et ont été supprimés.', 'warn');
    setTimeout(() => {
      const fb = document.getElementById('form-feedback');
      if (fb.classList.contains('warn')) fb.className = 'feedback';
    }, 3000);
  }
  const n = this.value.length;
  const el = document.getElementById('char-count');
  el.textContent = `${n} / 500`;
  el.classList.toggle('over', n > 500);
});

// Send on Ctrl+Enter / Cmd+Enter
document.getElementById('content').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) sendMessage();
});

async function sendMessage() {
  const password = document.getElementById('password').value;
  const content = document.getElementById('content').value.trim();
  const sender = document.getElementById('sender').value.trim() || undefined;
  const image = getImageData() || undefined;
  const fb = document.getElementById('form-feedback');
  fb.className = 'feedback';

  if (!password) { setFeedback('Entrez le mot de passe.', 'warn'); return; }
  if (!content) { setFeedback('Le message est vide.', 'warn'); return; }
  if (content.length > 500) { setFeedback('Message trop long (max 500 caractères).', 'warn'); return; }

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.textContent = 'Envoi…';

  try {
    const r = await fetch(`/api/public/${identifier}/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password, content, sender, image }),
    });
    const data = await r.json();

    if (r.ok) {
      // Remember password for this session
      sessionStorage.setItem('telex_pwd_' + identifier, password);
      savedPassword = password;
      document.getElementById('success-sub').textContent =
        `Il sera imprimé chez ${clientName} dans quelques instants.`;
      show('success');
    } else if (r.status === 429) {
      setFeedback(data.detail, 'err');
    } else if (r.status === 401) {
      setFeedback(data.detail, 'err');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
      savedPassword = '';
      sessionStorage.removeItem('telex_pwd_' + identifier);
    } else {
      setFeedback(data.detail || 'Erreur. Réessayez.', 'err');
    }
  } catch {
    setFeedback('Erreur de connexion. Réessayez.', 'err');
  }

  btn.disabled = false;
  btn.textContent = 'ENVOYER →';
}

function setFeedback(msg, type) {
  const fb = document.getElementById('form-feedback');
  fb.textContent = msg;
  fb.className = `feedback ${type}`;
}

function newMessage() {
  document.getElementById('content').value = '';
  document.getElementById('char-count').textContent = '0 / 500';
  document.getElementById('form-feedback').className = 'feedback';
  if (savedPassword) {
    document.getElementById('password').value = savedPassword;
  }
  resetCanvas();
  show('form');
  document.getElementById('content').focus();
}

function toggleTheme() {
  const current = document.documentElement.dataset.theme || 'amber';
  const next = current === 'green' ? 'amber' : 'green';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('telex_theme', next);
}

// ── Image / Drawing ──────────────────────────────────────────────────────────
let imgOpen = false;
let canvasReady = false;
let currentTool = 'pen';
let currentColor = 0;
let drawing = false;
let lastX = 0, lastY = 0;
const undoStack = [];

function toggleImageSection() {
  imgOpen = !imgOpen;
  document.getElementById('img-section').style.display = imgOpen ? '' : 'none';
  document.getElementById('img-toggle-btn').textContent = imgOpen
    ? '[ − Masquer le dessin / la photo ]'
    : '[ + Ajouter un dessin ou une photo ]';
  if (imgOpen && !canvasReady) { initCanvas(); canvasReady = true; }
}

function pushUndo() {
  const canvas = document.getElementById('draw-canvas');
  if (undoStack.length >= 20) undoStack.shift();
  undoStack.push(canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height));
  document.getElementById('undo-btn').disabled = false;
}

function undo() {
  if (!undoStack.length) return;
  const canvas = document.getElementById('draw-canvas');
  canvas.getContext('2d').putImageData(undoStack.pop(), 0, 0);
  document.getElementById('undo-btn').disabled = undoStack.length === 0;
}

function getDrawColor() { return currentTool === 'eraser' ? 255 : currentColor; }

function floodFill(canvas, x, y) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const id = ctx.getImageData(0, 0, w, h);
  const d = id.data;
  const xi = Math.floor(x), yi = Math.floor(y);
  const ti = (yi * w + xi) * 4;
  const tr = d[ti], tg = d[ti+1], tb = d[ti+2];
  const fc = getDrawColor();
  if (tr === fc && tg === fc && tb === fc) return;
  const visited = new Uint8Array(w * h);
  const stack = [yi * w + xi];
  while (stack.length) {
    const idx = stack.pop();
    if (visited[idx]) continue;
    visited[idx] = 1;
    const px = idx * 4;
    if (Math.abs(d[px]-tr) > 25 || Math.abs(d[px+1]-tg) > 25 || Math.abs(d[px+2]-tb) > 25) continue;
    d[px] = d[px+1] = d[px+2] = fc; d[px+3] = 255;
    const cx = idx % w, cy = Math.floor(idx / w);
    if (cx > 0) stack.push(idx-1);
    if (cx < w-1) stack.push(idx+1);
    if (cy > 0) stack.push(idx-w);
    if (cy < h-1) stack.push(idx+w);
  }
  ctx.putImageData(id, 0, 0);
}

function initCanvas() {
  const canvas = document.getElementById('draw-canvas');
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  function pos(e) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) * canvas.width / r.width, y: (src.clientY - r.top) * canvas.height / r.height };
  }
  function dot(p) {
    const sz = +document.getElementById('pen-size').value;
    const c = getDrawColor();
    ctx.beginPath(); ctx.arc(p.x, p.y, sz/2, 0, Math.PI*2);
    ctx.fillStyle = `rgb(${c},${c},${c})`; ctx.fill();
  }
  function line(from, to) {
    const sz = +document.getElementById('pen-size').value;
    const c = getDrawColor();
    ctx.beginPath(); ctx.moveTo(from.x, from.y); ctx.lineTo(to.x, to.y);
    ctx.lineWidth = sz; ctx.lineCap = 'round';
    ctx.strokeStyle = `rgb(${c},${c},${c})`; ctx.stroke();
  }
  canvas.addEventListener('mousedown', e => {
    const p = pos(e);
    if (currentTool === 'fill') { pushUndo(); floodFill(canvas, p.x, p.y); return; }
    pushUndo(); drawing = true; dot(p); lastX = p.x; lastY = p.y;
  });
  canvas.addEventListener('mousemove', e => { if (!drawing) return; const p = pos(e); line({x:lastX,y:lastY}, p); lastX = p.x; lastY = p.y; });
  canvas.addEventListener('mouseup', () => drawing = false);
  canvas.addEventListener('mouseleave', () => drawing = false);
  canvas.addEventListener('touchstart', e => {
    e.preventDefault(); const p = pos(e);
    if (currentTool === 'fill') { pushUndo(); floodFill(canvas, p.x, p.y); return; }
    pushUndo(); drawing = true; dot(p); lastX = p.x; lastY = p.y;
  }, {passive:false});
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const p = pos(e); line({x:lastX,y:lastY}, p); lastX = p.x; lastY = p.y; }, {passive:false});
  canvas.addEventListener('touchend', () => drawing = false, {passive:false});
}

function setTool(t) {
  currentTool = t;
  ['pen','eraser','fill'].forEach(id => document.getElementById('tool-'+id).classList.toggle('active', t===id));
  const canvas = document.getElementById('draw-canvas');
  if (canvas) canvas.style.cursor = t === 'eraser' ? 'cell' : t === 'fill' ? 'pointer' : 'crosshair';
}

function setColor(gray) {
  currentColor = gray;
  document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', +s.dataset.gray === gray));
  if (currentTool === 'eraser') setTool('pen');
}

function clearCanvas() {
  if (!canvasReady) return;
  pushUndo();
  const canvas = document.getElementById('draw-canvas');
  canvas.getContext('2d').fillStyle = 'white';
  canvas.getContext('2d').fillRect(0, 0, canvas.width, canvas.height);
}

function resetCanvas() {
  if (!canvasReady) return;
  const canvas = document.getElementById('draw-canvas');
  canvas.getContext('2d').fillStyle = 'white';
  canvas.getContext('2d').fillRect(0, 0, canvas.width, canvas.height);
  undoStack.length = 0;
  document.getElementById('undo-btn').disabled = true;
}

function handleUpload(input) {
  const file = input.files[0];
  if (!file) return;
  if (!canvasReady) { initCanvas(); canvasReady = true; }
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.getElementById('draw-canvas');
      const ctx = canvas.getContext('2d');
      pushUndo();
      ctx.fillStyle = 'white'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
      const w = img.width * scale, h = img.height * scale;
      ctx.drawImage(img, (canvas.width - w) / 2, (canvas.height - h) / 2, w, h);
      applyDither(canvas);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function applyDither(canvas) {
  const ctx = canvas.getContext('2d');
  const id = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const d = id.data, w = canvas.width, h = canvas.height;
  const g = new Float32Array(w * h);
  for (let i = 0; i < w * h; i++) g[i] = 0.299 * d[i*4] + 0.587 * d[i*4+1] + 0.114 * d[i*4+2];
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const old = g[y*w+x], nv = old < 128 ? 0 : 255, err = old - nv;
      g[y*w+x] = nv;
      if (x+1 < w) g[y*w+x+1] += err * 7/16;
      if (y+1 < h) {
        if (x > 0) g[(y+1)*w+x-1] += err * 3/16;
        g[(y+1)*w+x] += err * 5/16;
        if (x+1 < w) g[(y+1)*w+x+1] += err / 16;
      }
    }
  }
  for (let i = 0; i < w * h; i++) {
    const v = g[i] < 128 ? 0 : 255;
    d[i*4] = d[i*4+1] = d[i*4+2] = v; d[i*4+3] = 255;
  }
  ctx.putImageData(id, 0, 0);
}

function getImageData() {
  if (!canvasReady || !imgOpen) return null;
  const canvas = document.getElementById('draw-canvas');
  const data = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data;
  for (let i = 0; i < data.length; i += 4) {
    if (data[i] < 250) return canvas.toDataURL('image/png').split(',')[1];
  }
  return null;
}

init();
</script>
